<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PyBank</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏦</text></svg>">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #1d1d1f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }

        .logo {
            text-align: center;
            margin-bottom: 48px;
        }

        .logo h1 {
            font-size: 40px;
            font-weight: 700;
            color: #1d1d1f;
            letter-spacing: -1px;
        }

        .logo h1 span {
            color: #007aff;
        }

        .logo p {
            font-size: 16px;
            color: #6e6e73;
            margin-top: 6px;
            font-weight: 300;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .card {
            background: #f5f5f7;
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 16px;
        }

        .card h2 {
            font-size: 20px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 12px;
            background: #ffffff;
            border: 1.5px solid #e0e0e5;
            border-radius: 12px;
            font-size: 15px;
            color: #1d1d1f;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #007aff;
        }

        input::placeholder {
            color: #aeaeb2;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:hover  { opacity: 0.85; }
        button:active { transform: scale(0.98); }

        .btn-create { background: #007aff; color: white; }
        .btn-login  { background: #1d1d1f; color: white; }

        .divider {
            text-align: center;
            color: #aeaeb2;
            font-size: 13px;
            margin: 4px 0 16px;
        }

        .msg {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 14px;
            font-weight: 500;
        }

        .error {
            background: #fdecea;
            color: #c62828;
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="logo">
        <h1>Py<span>Bank</span></h1>
        <p>Simple. Secure. Yours.</p>
    </div>

    <div class="container">

        {% if msg %}
            <div class="msg">✅ {{ msg }}</div>
        {% endif %}
        {% if error %}
            <div class="error">❌ {{ error }}</div>
        {% endif %}

        <!-- Create Account Form -->
        <div class="card">
            <h2>Create Account</h2>
            <form action="/create" method="POST">
                <input type="text" name="username" placeholder="Choose a username" required>
                <input type="password" name="pin" placeholder="Choose a 4-digit PIN" required>
                <button class="btn-create" type="submit">Get Started</button>
            </form>
        </div>

        <div class="divider">— or sign in —</div>

        <!-- Login Form -->
        <div class="card">
            <h2>Login</h2>
            <form action="/login" method="POST">
                <input type="text" name="username" placeholder="Your username" required>
                <input type="password" name="pin" placeholder="Your PIN" required>
                <button class="btn-login" type="submit">Sign In</button>
            </form>
        </div>

    </div>

</body>
</html>
